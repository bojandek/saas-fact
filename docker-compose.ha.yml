version: '3.9'

# High Availability Docker Compose Setup
# Runs single-region HA infrastructure for local testing:
# - PostgreSQL primary + 2 replicas with Patroni
# - Redis Sentinel 3-node cluster
# - Neo4j 3-node HA cluster
# - Health check endpoints
#
# Usage: docker-compose -f docker-compose.ha.yml up -d
# Check health: curl http://localhost:3000/api/health

services:
  # ============================================================================
  # PostgreSQL HA Setup: Primary + 2 Replicas with Patroni
  # ============================================================================

  # Consul for Patroni consensus (needed for VIP management)
  consul:
    image: consul:latest
    container_name: consul-ha
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Primary
  postgres-primary:
    image: postgres:15-alpine
    container_name: postgres-primary-ha
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-saas_factory}
      POSTGRES_INITDB_ARGS: "-c max_wal_senders=10 -c wal_level=replica -c hot_standby=on -c shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./scripts/init-patroni-primary.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ha-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      consul:
        condition: service_healthy

  # PostgreSQL Replica 1
  postgres-replica-1:
    image: postgres:15-alpine
    container_name: postgres-replica-1-ha
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-saas_factory}
      POSTGRES_INITDB_ARGS: "-c hot_standby=on"
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-1-data:/var/lib/postgresql/data
      - ./scripts/init-replica-standby.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ha-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-primary:
        condition: service_healthy

  # PostgreSQL Replica 2
  postgres-replica-2:
    image: postgres:15-alpine
    container_name: postgres-replica-2-ha
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-saas_factory}
      POSTGRES_INITDB_ARGS: "-c hot_standby=on"
    ports:
      - "5434:5432"
    volumes:
      - postgres-replica-2-data:/var/lib/postgresql/data
      - ./scripts/init-replica-standby.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ha-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-primary:
        condition: service_healthy

  # ============================================================================
  # Redis HA Setup: Sentinel 3-node cluster
  # ============================================================================

  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: redis-master-ha
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
      - ./config/redis-master.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1-ha
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-1-data:/data
      - ./config/redis-replica.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --slaveof redis-master 6379
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      redis-master:
        condition: service_healthy

  # Redis Replica 2
  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2-ha
    ports:
      - "6381:6379"
    volumes:
      - redis-replica-2-data:/data
      - ./config/redis-replica.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --slaveof redis-master 6379
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      redis-master:
        condition: service_healthy

  # Redis Sentinel 1
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1-ha
    ports:
      - "26379:26379"
    volumes:
      - ./config/sentinel-1.conf:/usr/local/etc/redis/sentinel.conf
      - redis-sentinel-1-data:/data
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  # Redis Sentinel 2
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2-ha
    ports:
      - "26380:26379"
    volumes:
      - ./config/sentinel-2.conf:/usr/local/etc/redis/sentinel.conf
      - redis-sentinel-2-data:/data
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  # Redis Sentinel 3
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3-ha
    ports:
      - "26381:26379"
    volumes:
      - ./config/sentinel-3.conf:/usr/local/etc/redis/sentinel.conf
      - redis-sentinel-3-data:/data
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  # ============================================================================
  # Neo4j HA Setup: 3-node cluster with Raft consensus
  # ============================================================================

  # Neo4j Core 1 (Leader)
  neo4j-core-1:
    image: neo4j:5.0-enterprise
    container_name: neo4j-core-1-ha
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_EDITION: enterprise
      NEO4J_dbms_mode: CORE
      NEO4J_causal__clustering_expected_core_cluster_size: 3
      NEO4J_causal__clustering_initial_discovery_members: neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      NEO4J_causal__clustering_discovery_advertised_address: neo4j-core-1:5000
      NEO4J_causal__clustering_raft_advertised_address: neo4j-core-1:6000
      NEO4J_causal__clustering_transaction_advertised_address: neo4j-core-1:6001
      NEO4J_server_bolt_advertised_address: neo4j-core-1:7687
      NEO4J_server_http_advertised_address: neo4j-core-1:7474
      NEO4J_dbms_transaction_bookmark_state_size: 1000
    volumes:
      - neo4j-core-1-data:/var/lib/neo4j/data
      - neo4j-core-1-logs:/var/lib/neo4j/logs
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Core 2
  neo4j-core-2:
    image: neo4j:5.0-enterprise
    container_name: neo4j-core-2-ha
    ports:
      - "7688:7687"
      - "7475:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_EDITION: enterprise
      NEO4J_dbms_mode: CORE
      NEO4J_causal__clustering_expected_core_cluster_size: 3
      NEO4J_causal__clustering_initial_discovery_members: neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      NEO4J_causal__clustering_discovery_advertised_address: neo4j-core-2:5000
      NEO4J_causal__clustering_raft_advertised_address: neo4j-core-2:6000
      NEO4J_causal__clustering_transaction_advertised_address: neo4j-core-2:6001
      NEO4J_server_bolt_advertised_address: neo4j-core-2:7687
      NEO4J_server_http_advertised_address: neo4j-core-2:7474
      NEO4J_dbms_transaction_bookmark_state_size: 1000
    volumes:
      - neo4j-core-2-data:/var/lib/neo4j/data
      - neo4j-core-2-logs:/var/lib/neo4j/logs
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      neo4j-core-1:
        condition: service_healthy

  # Neo4j Core 3
  neo4j-core-3:
    image: neo4j:5.0-enterprise
    container_name: neo4j-core-3-ha
    ports:
      - "7689:7687"
      - "7476:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_EDITION: enterprise
      NEO4J_dbms_mode: CORE
      NEO4J_causal__clustering_expected_core_cluster_size: 3
      NEO4J_causal__clustering_initial_discovery_members: neo4j-core-1:5000,neo4j-core-2:5000,neo4j-core-3:5000
      NEO4J_causal__clustering_discovery_advertised_address: neo4j-core-3:5000
      NEO4J_causal__clustering_raft_advertised_address: neo4j-core-3:6000
      NEO4J_causal__clustering_transaction_advertised_address: neo4j-core-3:6001
      NEO4J_server_bolt_advertised_address: neo4j-core-3:7687
      NEO4J_server_http_advertised_address: neo4j-core-3:7474
      NEO4J_dbms_transaction_bookmark_state_size: 1000
    volumes:
      - neo4j-core-3-data:/var/lib/neo4j/data
      - neo4j-core-3-logs:/var/lib/neo4j/logs
    networks:
      - ha-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      neo4j-core-1:
        condition: service_healthy

networks:
  ha-net:
    driver: bridge

volumes:
  # PostgreSQL
  postgres-primary-data:
  postgres-replica-1-data:
  postgres-replica-2-data:

  # Redis
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  redis-sentinel-1-data:
  redis-sentinel-2-data:
  redis-sentinel-3-data:

  # Neo4j
  neo4j-core-1-data:
  neo4j-core-1-logs:
  neo4j-core-2-data:
  neo4j-core-2-logs:
  neo4j-core-3-data:
  neo4j-core-3-logs:
