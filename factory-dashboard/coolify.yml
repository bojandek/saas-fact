version: '3'

services:
  dashboard:
    image: node:20-alpine
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    env:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3