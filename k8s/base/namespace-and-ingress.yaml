---
# ─────────────────────────────────────────────────────────────────────────────
# Namespace
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: saas-factory
  labels:
    name: saas-factory
    environment: production
---
# ─────────────────────────────────────────────────────────────────────────────
# Ingress — NGINX with TLS (cert-manager)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-factory-ingress
  namespace: saas-factory
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"  # AI calls take time
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - factory.yourdomain.com
      secretName: saas-factory-tls
  rules:
    - host: factory.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: factory-dashboard
                port:
                  name: http
          - path: /brain
            pathType: Prefix
            backend:
              service:
                name: factory-brain
                port:
                  name: http
---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMaps
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: factory-dashboard-config
  namespace: saas-factory
data:
  NEXT_PUBLIC_APP_URL: "https://factory.yourdomain.com"
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: factory-brain-config
  namespace: saas-factory
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  WORKER_CONCURRENCY: "3"
  RETRY_MAX_ATTEMPTS: "3"
  CONSOLIDATE_INTERVAL_MINUTES: "60"
---
# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicy — restrict traffic between pods
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: factory-dashboard-netpol
  namespace: saas-factory
spec:
  podSelector:
    matchLabels:
      app: factory-dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
  egress:
    - {}  # Allow all egress (Supabase, OpenAI, Stripe)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: factory-brain-netpol
  namespace: saas-factory
spec:
  podSelector:
    matchLabels:
      app: factory-brain
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: factory-dashboard
      ports:
        - port: 4000
  egress:
    - {}  # Allow all egress (OpenAI, Supabase)
