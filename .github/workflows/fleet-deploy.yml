name: Fleet Deploy

# Automatically deploys changed apps to Coolify on push to main
# Only deploys apps that have changed files (smart detection)
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'blocks/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      app_filter:
        description: 'Deploy specific app (leave empty for auto-detect changed apps)'
        required: false
        default: ''
      force_all:
        description: 'Force deploy all apps regardless of changes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: fleet-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Detect which apps changed ─────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: detect
        run: |
          FORCE_ALL="${{ github.event.inputs.force_all }}"
          FILTER="${{ github.event.inputs.app_filter }}"
          
          if [ -n "$FILTER" ]; then
            # Manual single app
            APPS="[\"$FILTER\"]"
          elif [ "$FORCE_ALL" = "true" ]; then
            # Force all apps
            APPS=$(find apps -maxdepth 1 -mindepth 1 -type d 2>/dev/null | \
              sed 's|apps/||' | \
              jq -R -s 'split("\n") | map(select(. != ""))' 2>/dev/null || echo "[]")
          else
            # Auto-detect from git diff
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")
            
            # Check if shared packages changed (triggers all apps)
            SHARED_CHANGED=$(echo "$CHANGED" | grep -E "^(blocks/|packages/|pnpm-lock)" | head -1 || true)
            
            if [ -n "$SHARED_CHANGED" ]; then
              echo "Shared packages changed — deploying all apps"
              APPS=$(find apps -maxdepth 1 -mindepth 1 -type d 2>/dev/null | \
                sed 's|apps/||' | \
                jq -R -s 'split("\n") | map(select(. != ""))' 2>/dev/null || echo "[]")
            else
              # Only deploy apps with direct changes
              APPS=$(echo "$CHANGED" | grep "^apps/" | \
                sed 's|apps/\([^/]*\)/.*|\1|' | sort -u | \
                jq -R -s 'split("\n") | map(select(. != ""))' 2>/dev/null || echo "[]")
            fi
          fi
          
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Apps to deploy: $APPS"

  # ── Build and test before deploy ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r --filter="./packages/**" --filter="./factory-brain" typecheck 2>/dev/null || true

      - name: Run tests
        run: pnpm -r --filter="./packages/**" --filter="./blocks/**" test 2>/dev/null || true

  # ── Deploy each app in parallel ───────────────────────────────────────────────
  deploy-apps:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-test]
    if: needs.detect-changes.outputs.apps != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Coolify webhook for app
        id: get-webhook
        run: |
          APP="${{ matrix.app }}"
          # Convert app name to secret key: saas-001-booking -> COOLIFY_WEBHOOK_SAAS_001_BOOKING
          SECRET_KEY="COOLIFY_WEBHOOK_$(echo $APP | tr '[:lower:]-' '[:upper:]_')"
          echo "secret_key=$SECRET_KEY" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT

      - name: Deploy to Coolify
        env:
          COOLIFY_WEBHOOK: ${{ secrets[steps.get-webhook.outputs.secret_key] || secrets.COOLIFY_WEBHOOK }}
        run: |
          APP="${{ matrix.app }}"
          
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "⚠️  No Coolify webhook configured for $APP. Skipping deployment."
            exit 0
          fi
          
          echo "🚀 Deploying $APP to Coolify..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$COOLIFY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"app\": \"$APP\",
              \"commit\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"triggeredBy\": \"${{ github.actor }}\"
            }")
          
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ $APP deployment triggered (HTTP $HTTP_STATUS)"
          else
            echo "❌ $APP deployment failed (HTTP $HTTP_STATUS): $BODY"
            exit 1
          fi

      - name: Wait for deployment and health check
        env:
          APP_URL: ${{ secrets[format('APP_URL_{0}', steps.get-webhook.outputs.app)] }}
        run: |
          APP="${{ matrix.app }}"
          
          if [ -z "$APP_URL" ]; then
            echo "ℹ️  No APP_URL configured for $APP, skipping health check"
            exit 0
          fi
          
          echo "⏳ Waiting for $APP to be healthy..."
          
          MAX_ATTEMPTS=20
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL/api/health" 2>/dev/null || echo "000")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ $APP is healthy after $ATTEMPT attempts"
              exit 0
            fi
            
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HTTP_STATUS — waiting 15s..."
            sleep 15
          done
          
          echo "⚠️  $APP did not become healthy after $MAX_ATTEMPTS attempts"
          # Don't fail the workflow — deployment may still be in progress

  # ── Deployment summary ────────────────────────────────────────────────────────
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-test, deploy-apps]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Fleet Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Changes | ${{ needs.detect-changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Apps | ${{ needs.deploy-apps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Apps deployed:** \`${{ needs.detect-changes.outputs.apps }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
