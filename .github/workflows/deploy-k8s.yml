name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'factory-dashboard/**'
      - 'factory-brain/**'
      - 'k8s/**'
      - '.github/workflows/deploy-k8s.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]
      skip_tests:
        description: 'Skip tests before deploy'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/saas-fact

jobs:
  # ── Build & Push Docker Images ───────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      dashboard-tag: ${{ steps.meta-dashboard.outputs.tags }}
      brain-tag: ${{ steps.meta-brain.outputs.tags }}
      sha-tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set SHA tag
        id: sha
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/factory-dashboard
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push factory-dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./factory-dashboard
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Docker metadata (brain)
        id: meta-brain
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/factory-brain
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push factory-brain
        uses: docker/build-push-action@v5
        with:
          context: ./factory-brain
          push: true
          tags: ${{ steps.meta-brain.outputs.tags }}
          labels: ${{ steps.meta-brain.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run Database Migrations ──────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          npm install -g supabase
          supabase db push \
            --project-id "$SUPABASE_PROJECT_ID" \
            --db-url "${{ secrets.DATABASE_URL }}"

  # ── Deploy to Kubernetes ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags in kustomization
        run: |
          cd k8s/overlays/production
          kustomize edit set image \
            ${{ env.IMAGE_PREFIX }}/factory-dashboard:${{ needs.build.outputs.sha-tag }} \
            ${{ env.IMAGE_PREFIX }}/factory-brain:${{ needs.build.outputs.sha-tag }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/production --dry-run=client
          kubectl apply -k k8s/overlays/production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/factory-dashboard -n saas-factory --timeout=5m
          kubectl rollout status deployment/factory-brain -n saas-factory --timeout=5m

      - name: Verify deployment health
        run: |
          kubectl get pods -n saas-factory
          kubectl get services -n saas-factory

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/factory-dashboard -n saas-factory
          kubectl rollout undo deployment/factory-brain -n saas-factory
