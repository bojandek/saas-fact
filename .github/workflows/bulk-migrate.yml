name: Bulk Database Migrations

# Runs migrations across all apps/ in parallel
# Triggered manually or on migration file changes
on:
  workflow_dispatch:
    inputs:
      app_filter:
        description: 'Run migrations for specific app (leave empty for all apps)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — show what would be migrated without applying'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths:
      - 'apps/*/supabase/migrations/**'
      - 'factory-brain/src/migrations/**'
      - '.github/workflows/bulk-migrate.yml'

concurrency:
  group: migrations-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress migrations

jobs:
  # ── Step 1: Discover all apps with migrations ────────────────────────────────
  discover-apps:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.find-apps.outputs.apps }}
      factory-migrations: ${{ steps.find-factory.outputs.has_migrations }}
    steps:
      - uses: actions/checkout@v4

      - name: Find apps with migrations
        id: find-apps
        run: |
          FILTER="${{ github.event.inputs.app_filter }}"
          
          if [ -n "$FILTER" ]; then
            # Single app mode
            if [ -d "apps/$FILTER/supabase/migrations" ]; then
              APPS="[\"$FILTER\"]"
            else
              echo "App '$FILTER' not found or has no migrations"
              APPS="[]"
            fi
          else
            # All apps mode
            APPS=$(find apps -maxdepth 2 -name "migrations" -type d 2>/dev/null | \
              sed 's|apps/||' | sed 's|/supabase/migrations||' | \
              jq -R -s 'split("\n") | map(select(. != ""))' 2>/dev/null || echo "[]")
          fi
          
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Found apps: $APPS"

      - name: Check factory migrations
        id: find-factory
        run: |
          if ls factory-brain/src/migrations/*.sql 2>/dev/null | head -1; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: Run factory-level migrations (shared schema) ────────────────────
  factory-migrations:
    name: Factory Shared Schema
    runs-on: ubuntu-latest
    needs: discover-apps
    if: needs.discover-apps.outputs.factory-migrations == 'true'
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Run factory migrations (dry run check)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 DRY RUN — Factory migrations that would be applied:"
          for f in factory-brain/src/migrations/*.sql; do
            echo "  📄 $(basename $f)"
          done

      - name: Run factory migrations
        if: github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "⚠️  SUPABASE_DB_URL not set. Skipping factory migrations."
            exit 0
          fi
          
          echo "🚀 Running factory-level migrations..."
          for migration in $(ls factory-brain/src/migrations/*.sql | sort); do
            echo "  ▶ Applying: $(basename $migration)"
            psql "$SUPABASE_DB_URL" -f "$migration" && \
              echo "  ✅ $(basename $migration) applied" || \
              echo "  ⚠️  $(basename $migration) skipped (may already exist)"
          done
          echo "✅ Factory migrations complete"

  # ── Step 3: Run app-level migrations in parallel ─────────────────────────────
  app-migrations:
    name: Migrate ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [discover-apps, factory-migrations]
    if: |
      always() &&
      needs.discover-apps.result == 'success' &&
      needs.discover-apps.outputs.apps != '[]' &&
      (needs.factory-migrations.result == 'success' || needs.factory-migrations.result == 'skipped')
    environment: ${{ github.event.inputs.environment || 'production' }}
    strategy:
      fail-fast: false  # Continue other apps even if one fails
      max-parallel: 10  # Run up to 10 migrations simultaneously
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase

      - name: Check for pending migrations
        id: check-migrations
        run: |
          APP="${{ matrix.app }}"
          MIGRATION_DIR="apps/$APP/supabase/migrations"
          
          if [ -d "$MIGRATION_DIR" ]; then
            COUNT=$(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | wc -l)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "📊 $APP: $COUNT migration files found"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "⏭️  $APP: No migrations directory"
          fi

      - name: Dry run — show pending migrations
        if: github.event.inputs.dry_run == 'true' && steps.check-migrations.outputs.count != '0'
        run: |
          APP="${{ matrix.app }}"
          echo "🔍 DRY RUN — $APP migrations that would be applied:"
          for f in apps/$APP/supabase/migrations/*.sql; do
            echo "  📄 $(basename $f)"
          done

      - name: Apply migrations
        if: github.event.inputs.dry_run != 'true' && steps.check-migrations.outputs.count != '0'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # Each app has its own DB URL secret: SUPABASE_DB_URL_SAAS_001_BOOKING
          # Pattern: SUPABASE_DB_URL_<APP_NAME_UPPERCASE_WITH_UNDERSCORES>
        run: |
          APP="${{ matrix.app }}"
          
          # Convert app name to secret key format
          # e.g., "saas-001-booking" -> "SAAS_001_BOOKING"
          SECRET_KEY="SUPABASE_DB_URL_$(echo $APP | tr '[:lower:]-' '[:upper:]_')"
          
          # Get DB URL from environment (GitHub secrets are injected as env vars)
          DB_URL="${!SECRET_KEY}"
          
          # Fallback to shared DB URL
          if [ -z "$DB_URL" ]; then
            DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          fi
          
          if [ -z "$DB_URL" ]; then
            echo "⚠️  No DB URL found for $APP (tried $SECRET_KEY and SUPABASE_DB_URL). Skipping."
            exit 0
          fi
          
          echo "🚀 Running migrations for $APP..."
          
          # Use Supabase CLI if supabase project is configured
          if [ -f "apps/$APP/supabase/config.toml" ]; then
            cd "apps/$APP"
            supabase db push --db-url "$DB_URL" && \
              echo "✅ $APP migrations applied via Supabase CLI" || \
              { echo "❌ $APP migration failed"; exit 1; }
          else
            # Fallback: apply SQL files directly
            for migration in $(ls "apps/$APP/supabase/migrations/"*.sql | sort); do
              echo "  ▶ $(basename $migration)"
              psql "$DB_URL" -f "$migration" && \
                echo "  ✅ Applied" || \
                echo "  ⚠️  Skipped (may already exist)"
            done
            echo "✅ $APP migrations complete"
          fi

      - name: Post migration health check
        if: github.event.inputs.dry_run != 'true' && steps.check-migrations.outputs.count != '0'
        run: |
          APP="${{ matrix.app }}"
          
          # Try to read app URL from config
          APP_URL_KEY="APP_URL_$(echo $APP | tr '[:lower:]-' '[:upper:]_')"
          APP_URL="${!APP_URL_KEY}"
          
          if [ -n "$APP_URL" ]; then
            echo "🏥 Health check for $APP at $APP_URL..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ $APP is healthy (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  $APP health check returned HTTP $HTTP_STATUS"
            fi
          else
            echo "ℹ️  No APP_URL configured for $APP, skipping health check"
          fi

  # ── Step 4: Summary report ───────────────────────────────────────────────────
  migration-summary:
    name: Migration Summary
    runs-on: ubuntu-latest
    needs: [discover-apps, factory-migrations, app-migrations]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Discover Apps | ${{ needs.discover-apps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Factory Migrations | ${{ needs.factory-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Migrations | ${{ needs.app-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 **This was a DRY RUN — no changes were applied.**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: needs.app-migrations.result == 'failure' || needs.factory-migrations.result == 'failure'
        run: |
          echo "❌ One or more migrations failed!"
          echo "Check the individual job logs for details."
          exit 1
